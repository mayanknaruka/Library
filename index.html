<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>My Library</h1>

<button id="new-book-btn">New Book</button>

<dialog id="book-dialog">

    <form id="book-form">

        <label for="title">Title</label>
        <input
            type="text"
            id="title"
            name="title"
            required
        >

        <label for="author">Author</label>
        <input
            type="text"
            id="author"
            name="author"
            required
        >

        <label for="pages">Pages</label>
        <input
            type="number"
            id="pages"
            name="pages"
            required
        >

        <label for="read">
            <input
                type="checkbox"
                id="read"
                name="read"
            >
            Read
        </label>

        <button type="submit">
            Add Book
        </button>

    </form>

</dialog>

<div id="book-container"></div>

    <script src="script.js"></script>
</body>

</html>
